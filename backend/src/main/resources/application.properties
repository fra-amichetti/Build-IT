# Upload file
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads

# ── ServerLog: database separato per i log di sistema ────────────────────────
# Per un DB davvero separato: cambia url con jdbc:postgresql://altro-host/serverlog_db
# e imposta username/password del secondo server.
# Di default usa le stesse credenziali del DB principale (stesso Supabase,
# stessa connessione ma tabella log_entries logicamente separata).
app.log-datasource.url=${spring.datasource.url}
app.log-datasource.username=${spring.datasource.username}
app.log-datasource.password=${spring.datasource.password}